name: Export deploy wallet (encrypted)

# One-off helper: encrypts the cached devnet deploy wallet with the RSA
# public key in .github/wallet-export-pub.pem and commits the ciphertext.
# Only the holder of the matching private key (the Claude session that
# generated it) can decrypt. Safe to run on a public repo.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Same container as the deploy workflow: the cache archive restores to
    # the absolute path it was saved from (/root/devnet-keys).
    container:
      image: backpackapp/build:v0.30.1
      options: --user root
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4

      - name: Set up git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Restore devnet keys cache
        uses: actions/cache/restore@v4
        with:
          path: /root/devnet-keys
          key: devnet-keys-v1
          fail-on-cache-miss: true

      - name: Encrypt wallet with export public key
        run: |
          mkdir -p .github/wallet-export
          for f in deploy-wallet.json prop_vault-keypair.json; do
            openssl pkeyutl -encrypt -pubin -inkey .github/wallet-export-pub.pem \
              -pkeyopt rsa_padding_mode:oaep \
              -in "/root/devnet-keys/$f" -out ".github/wallet-export/$f.enc"
          done
          ls -la .github/wallet-export/

      - name: Commit ciphertext
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/wallet-export/
          git commit -m "Export encrypted deploy wallet [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
